name: Pokemon Playable README

on:
  issues:
    types: [opened]

jobs:
  play:
    runs-on: ubuntu-latest
    if: startsWith(github.event.issue.title, 'pokemon|')
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16'

      - name: Process Move and Generate Frame
        uses: Anish-Agnihotri/pokemon-readme@v1.1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          issue_number: ${{ github.event.issue.number }}
          issue_title: ${{ github.event.issue.title }}
          repository: ${{ github.repository }}
          rom_url: ${{ secrets.ROM_URL }}

      - name: Commit Updated Frame
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add pokemon.png
          git commit -m "Update Pokemon screen" || exit 0
          git push
