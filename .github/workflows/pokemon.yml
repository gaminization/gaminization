name: Play Pokemon (Issue Driven)

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

jobs:
  play:
    runs-on: ubuntu-latest
    if: startsWith(github.event.issue.title, 'pokemon|')
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install PyBoy and dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyboy Pillow

      - name: Process Command
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: |
          # Extract command (e.g., pokemon|up -> up)
          COMMAND=$(echo "$ISSUE_TITLE" | cut -d'|' -f2 | tr -d ' ')
          echo "Received command: $COMMAND"
          
          # Run the emulator script to process the command
          # Note: Requires pokemon_emulator.py and rom.gb to be present
          python scripts/pokemon_emulator.py "$COMMAND"

      - name: Commit Game State and Screenshot
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add state.state frame.png
          git commit -m "Update Pokémon game state: $COMMAND" || exit 0
          git push

      - name: Close Issue
        uses: peter-evans/close-issue@v3
        with:
          issue-number: ${{ github.event.issue.number }}
          comment: "Command processed! The game screen has been updated."
